<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/layout :: header}"></head>
  <body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-5">
      <h2 class="mb-4">Distribution Centers</h2>
      <div class="row">
        <div class="col-md-6 mb-4">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h5 class="card-title text-success">Toronto Hub (HQ)</h5>
              <p class="card-text text-muted">
                Primary shipping center for Ontario and the East Coast.
              </p>
              <ul class="list-unstyled">
                <li><strong>Capacity:</strong> 50,000 Units</li>
                <li><strong>Staffing:</strong> 24/7 Operations</li>
              </ul>
            </div>
          </div>
        </div>
        <div class="col-md-6 mb-4">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h5 class="card-title text-success">Vancouver Annex</h5>
              <p class="card-text text-muted">
                Secondary hub for Western Canada and US imports.
              </p>
              <ul class="list-unstyled">
                <li><strong>Capacity:</strong> 25,000 Units</li>
                <li><strong>Staffing:</strong> Mon-Fri</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
